spring:
  application:
    name: loanflow-ai
  datasource:
    url: jdbc:postgresql://localhost:5432/loanflow_ai
    username: loanflow
    password: loanflow
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

loanflow:
  s3:
    bucket-name: loanflow-documents
  chroma:
    base-url: http://localhost:8000
    collection-name: loan_documents
  ollama:
    base-url: http://localhost:11434
    embedding-model: nomic-embed-text
    chat-model: llama3.1
